services:
  - type: web
    name: fileflow
    runtime: python
    buildCommand: "pip install -r FileFlow/backend/requirements.txt && cd FileFlow && python -c \"from backend.app import app, db; app.app_context().push(); db.create_all()\""
    startCommand: "cd FileFlow && gunicorn -w 4 -b 0.0.0.0:$PORT 'backend.app:app'"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fileflow_db
          property: connectionString
    healthCheckPath: /

databases:
  - name: fileflow_db
    databaseName: fileflow
    user: fileflow_user
    region: oregon
